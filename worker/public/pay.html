<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>x402 Payment</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      color: #fff;
    }
    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 32px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .header {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo { font-size: 24px; font-weight: 700; letter-spacing: 2px; }
    .subtitle { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 4px; }
    .payment-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(10px);
      margin-bottom: 24px;
    }
    .payment-amount {
      font-size: 36px;
      font-weight: 700;
      color: #a78bfa;
      margin-bottom: 4px;
    }
    .payment-chain {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.06);
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      margin-top: 8px;
    }
    .payment-to {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      margin-top: 12px;
      word-break: break-all;
      font-family: monospace;
    }
    .connect-btn {
      width: 100%;
      padding: 16px;
      margin-bottom: 16px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      cursor: pointer;
      transition: all 0.2s;
    }
    .connect-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(124,58,237,0.4);
    }
    .connect-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .pay-status {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      text-align: center;
      margin-bottom: 16px;
      word-break: break-all;
    }
    .pay-status.success { color: #4ade80; }
    .pay-status.error { color: #f87171; }
    .divider {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 8px 0 20px;
    }
    .copy-section {
      width: 100%;
      text-align: center;
    }
    .copy-section p {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 10px;
    }
    .copy-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .copy-input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 12px;
      font-family: monospace;
      text-overflow: ellipsis;
      overflow: hidden;
      white-space: nowrap;
    }
    .copy-btn {
      padding: 10px 16px;
      border: 1px solid rgba(167,139,250,0.4);
      border-radius: 8px;
      background: rgba(167,139,250,0.15);
      color: #a78bfa;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .copy-btn:hover { background: rgba(167,139,250,0.25); }
    .copy-btn.copied { color: #4ade80; border-color: rgba(74,222,128,0.4); }
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(74,222,128,0.9);
      color: #000;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">⚡ x402</div>
      <div class="subtitle">Smart Socket Payment</div>
    </div>

    <div class="payment-card">
      <div class="payment-amount" id="pay-amount">0.01 USDC</div>
      <div class="payment-chain" id="pay-chain">Polygon Mainnet</div>
      <div class="payment-to">To: <span id="pay-receiver"></span></div>
    </div>

    <!-- Connect & Pay button -->
    <button class="connect-btn" id="connect-btn">Connect Wallet & Pay</button>

    <!-- Pay status -->
    <div class="pay-status" id="pay-status" style="display:none;"></div>

    <div class="divider"></div>

    <div class="copy-section">
      <p>Or copy the receiver address and transfer manually</p>
      <div class="copy-row">
        <input class="copy-input" id="copy-address" readonly>
        <button class="copy-btn" id="copy-btn">Copy</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">Address copied!</div>

  <script type="module">
  import { createAppKit, WagmiAdapter, WagmiCore, networks } from
    'https://cdn.jsdelivr.net/npm/@reown/appkit-cdn@1.8.19/dist/appkit.js';

  const { polygon } = networks;

  // Read payment params from query string
  const params = new URLSearchParams(window.location.search);
  const receiver = params.get('receiver') || '';
  const amount = params.get('amount') || '0.01';
  const token = params.get('token') || 'USDC';
  const contract = params.get('contract') || '';
  const chainId = parseInt(params.get('chainId') || '137', 10);
  const chainName = params.get('chainName') || 'Polygon';
  const decimals = parseInt(params.get('decimals') || '6', 10);
  const amountWei = params.get('amountWei') || '10000';
  const projectId = params.get('projectId') || '';

  // Display payment info
  document.getElementById('pay-amount').textContent = `${amount} ${token}`;
  document.getElementById('pay-chain').textContent = `${chainName} Mainnet`;
  document.getElementById('pay-receiver').textContent = receiver;
  document.getElementById('copy-address').value = receiver;

  const connectBtn = document.getElementById('connect-btn');
  const payStatus = document.getElementById('pay-status');

  // Initialize Reown AppKit
  const wagmiAdapter = new WagmiAdapter({
    projectId,
    networks: [polygon],
  });

  const appKit = createAppKit({
    projectId,
    adapters: [wagmiAdapter],
    networks: [polygon],
    defaultNetwork: polygon,
    metadata: {
      name: 'x402 Smart Socket',
      description: 'Pay-per-Use Smart Socket Payment',
      url: window.location.origin,
      icons: [],
    },
  });

  // ERC-20 transfer ABI
  const transferAbi = [{
    name: 'transfer',
    type: 'function',
    stateMutability: 'nonpayable',
    inputs: [
      { name: 'to', type: 'address' },
      { name: 'amount', type: 'uint256' },
    ],
    outputs: [{ name: '', type: 'bool' }],
  }];

  const API_BASE = window.location.origin;

  let paymentSent = false;
  let paymentDone = false;
  let userInitiated = false;
  let pollTimer = null;

  // Connect button click
  connectBtn.addEventListener('click', async () => {
    paymentSent = false;
    paymentDone = false;
    userInitiated = true;
    await appKit.open();
  });

  // Watch for connection state changes
  appKit.subscribeState(async (state) => {
    if (!state.open && appKit.getIsConnectedState() && !paymentSent && userInitiated) {
      await sendTransfer();
    }
  });

  // Start polling blockchain for payment as fallback
  async function startPolling() {
    stopPolling();
    try {
      const blockRes = await fetch(`${API_BASE}/latest-block`);
      const blockData = await blockRes.json();
      const sinceBlock = blockData.blockNumber;

      pollTimer = setInterval(async () => {
        if (paymentDone) { stopPolling(); return; }
        try {
          const res = await fetch(`${API_BASE}/poll-payment?sinceBlock=${sinceBlock}`);
          const data = await res.json();
          if (data.found && data.txHash) {
            onPaymentSuccess(data.txHash);
          }
        } catch (e) { /* retry next interval */ }
      }, 8000);
    } catch (e) { /* can't poll without block number */ }
  }

  function stopPolling() {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  }

  function onPaymentSuccess(txHash) {
    if (paymentDone) return;
    paymentDone = true;
    stopPolling();
    connectBtn.disabled = true;
    connectBtn.textContent = 'Payment Complete';
    payStatus.style.display = 'block';
    payStatus.className = 'pay-status success';
    payStatus.textContent = 'Payment successful! TxHash: ' + txHash;
  }

  async function sendTransfer() {
    paymentSent = true;
    connectBtn.disabled = true;
    connectBtn.textContent = 'Processing...';
    payStatus.style.display = 'block';
    payStatus.className = 'pay-status';
    payStatus.textContent = 'Sending transaction...';

    // Start polling as fallback — race with writeContract
    startPolling();

    try {
      const txHash = await WagmiCore.writeContract(wagmiAdapter.wagmiConfig, {
        address: contract,
        abi: transferAbi,
        functionName: 'transfer',
        args: [receiver, BigInt(amountWei)],
        chainId: chainId,
      });

      if (paymentDone) return; // polling already detected it

      payStatus.textContent = 'Waiting for confirmation...';

      const receipt = await WagmiCore.waitForTransactionReceipt(wagmiAdapter.wagmiConfig, {
        hash: txHash,
        confirmations: 1,
      });

      if (receipt.status === 'success') {
        onPaymentSuccess(txHash);
      } else {
        throw new Error('Transaction failed on-chain');
      }
    } catch (err) {
      if (paymentDone) return; // polling already detected it, ignore error
      payStatus.className = 'pay-status error';
      if (err.message && err.message.includes('User rejected')) {
        payStatus.textContent = 'Transaction cancelled';
        stopPolling();
      } else {
        payStatus.textContent = 'Error: ' + (err.shortMessage || err.message || 'Unknown error');
        // Keep polling — tx might have been sent but WalletConnect lost connection
      }
      connectBtn.disabled = false;
      connectBtn.textContent = 'Connect Wallet & Pay';
      paymentSent = false;
    }
  }

  // Copy button
  const copyBtn = document.getElementById('copy-btn');
  const toast = document.getElementById('toast');

  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(receiver).then(() => {
      copyBtn.textContent = 'Copied!';
      copyBtn.classList.add('copied');
      toast.style.display = 'block';
      setTimeout(() => {
        toast.style.display = 'none';
        copyBtn.textContent = 'Copy';
        copyBtn.classList.remove('copied');
      }, 2000);
    });
  });
  </script>
</body>
</html>
